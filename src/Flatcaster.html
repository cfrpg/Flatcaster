<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Flatcaster - cfrpg</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; --trig: #f2ce5b; --header: #30363d; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .layout { display: flex; flex-direction: column; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .top-row { display: flex; gap: 20px; }
        #matrix { display: grid; grid-template-columns: 100px repeat(8, 1fr); gap: 5px; background: #000; padding: 10px; border-radius: 8px; width: 800px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .row-label { color: #8b949e; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; }
        .fret-header { color: var(--accent); font-weight: bold; font-size: 12px; text-align: center; padding: 5px 0; border-bottom: 1px solid var(--header); margin-bottom: 5px; }
        .cell { height: 75px; background: #21262d; border-radius: 4px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #30363d; transition: background 0.05s, border-color 0.1s; }
        .v { font-size: 18px; font-weight: bold; color: #fff; }
        .sub { font-size: 9px; opacity: 0.5; margin-top: 4px; }
        .touched { border-color: #f85149 !important; box-shadow: inset 0 0 10px rgba(248, 81, 73, 0.2); z-index: 2; }
        .panel { flex: 1; background: var(--card); padding: 24px; border-radius: 12px; border: 1px solid #30363d; }
        .control-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; font-weight: 600; color: #8b949e; }
        input[type="range"] { width: 100%; cursor: pointer; }
        button { padding: 12px; border: none; border-radius: 6px; background: var(--accent); color: #fff; font-weight: bold; cursor: pointer; }
        button.secondary { background: #30363d; }
        #trigger-monitor { background: #000; border: 1px solid #30363d; border-radius: 8px; padding: 15px; min-height: 180px; font-family: 'Cascadia Code', monospace; }
        .monitor-header { color: var(--trig); font-size: 12px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .trig-row { height: 24px; line-height: 24px; font-size: 14px; color: #888; border-bottom: 1px solid #111; }
        .trig-row.latest { color: var(--trig); font-weight: bold; }
        .note-tag { background: #238636; color: white; padding: 2px 6px; border-radius: 3px; margin-left: 10px; font-size: 11px; }
        #debug-log { margin-top: 10px; background: #000; color: #3fb950; padding: 8px; font-size: 11px; border-radius: 4px; min-height: 34px; word-break: break-all; }
    </style>
</head>
<body>

<div class="layout">
    <div class="top-row">
        <div id="matrix"></div>
        <div class="panel">
            <button id="btn-connect" style="width:100%; font-size: 16px; margin-bottom: 20px;">连接串口</button>
            <div class="control-group">
                <button id="btn-mode" class="secondary">模式: ΔTc</button>
                <button id="btn-ref-manual" class="secondary" style="margin-top:5px">手动同步基准</button>
            </div>
            <div class="control-group">
                <label>判定阈值: <span id="label-touch">150</span></label>
                <input type="range" id="input-touch" min="10" max="2000" value="150">
            </div>
            <div class="control-group">
                <label>色阶范围: <span id="label-dmax">800</span></label>
                <input type="range" id="input-dmax" min="100" max="4000" value="800">
            </div>
            <div class="control-group" style="background:#000; padding:10px; border-radius:5px; border:1px solid #222;">
                <label style="color:var(--accent)">硬件状态</label>
                <div style="font-size:13px; margin-top:5px;">Capo: <span id="capo-val">0</span> | Offset: <span id="offset-val">0</span></div>
            </div>
            <div id="debug-log">等待连接...</div>
        </div>
    </div>
    <div id="trigger-monitor">
        <div class="monitor-header">REAL-TIME TRIGGER LOG</div>
        <div id="trig-list"></div>
    </div>
</div>

<script>
    const ROWS = 6, COLS = 8, TOTAL = ROWS * COLS;
    let tc_ref = new Array(TOTAL).fill(0);
    let current_tc = new Array(TOTAL).fill(0);
    let isDeltaMode = true;
    let triggerHistory = [];
    let capoA = 0, offsetB = 0;

    const matrixEl = document.getElementById('matrix');
    const trigListEl = document.getElementById('trig-list');
    const debugEl = document.getElementById('debug-log');
    const cells = [];
    const fretHeaders = [];

    function midiToNote(midi) {
        const names = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        return `${names[midi % 12]}${Math.floor(midi / 12) - 1}`;
    }

    function initMatrix() {
        matrixEl.innerHTML = '';
        cells.length = 0; fretHeaders.length = 0;
        const corner = document.createElement('div');
        corner.className = 'row-label'; corner.innerText = 'Fret →';
        matrixEl.appendChild(corner);
        for (let c = 0; c < COLS; c++) {
            const h = document.createElement('div');
            h.className = 'fret-header'; h.innerText = '-';
            matrixEl.appendChild(h); fretHeaders.push(h);
        }
        for (let r = 0; r < ROWS; r++) {
            const label = document.createElement('div');
            label.className = 'row-label'; label.innerText = `String ${r + 1}`;
            matrixEl.appendChild(label);
            for (let c = 0; c < COLS; c++) {
                const div = document.createElement('div');
                div.className = 'cell'; div.innerHTML = `<span class="v">0</span><span class="sub">R:0</span>`;
                matrixEl.appendChild(div);
                cells.push({ el: div, v: div.querySelector('.v'), sub: div.querySelector('.sub') });
            }
        }
        updateFretDisplay(); updateTriggerUI();
    }

    function updateFretDisplay() {
        for (let c = 0; c < COLS; c++) {
            fretHeaders[c].innerText = `F${c === 0 ? capoA : (c + capoA + offsetB)}`;
        }
        document.getElementById('capo-val').innerText = capoA;
        document.getElementById('offset-val').innerText = offsetB;
    }

    initMatrix();

    document.getElementById('btn-connect').onclick = async () => {
        try {
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 2000000 });
            document.getElementById('btn-connect').innerText = "通信中...";
            document.getElementById('btn-connect').disabled = true;
            
            const decoder = new TextDecoder();
            let buffer = '';
            const reader = port.readable.getReader();
            
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                let lines = buffer.split(/\r?\n/);
                buffer = lines.pop();

                for (let line of lines) {
                    if (line.length > 0) {
                        try {
                            dispatchProtocol(line.trim());
                        } catch (err) {
                            console.error("解析单行错误:", err);
                        }
                    }
                }
            }
        } catch (e) {
            debugEl.innerText = "串口错误: " + e.message;
            document.getElementById('btn-connect').innerText = "重连串口";
            document.getElementById('btn-connect').disabled = false;
        }
    };

    function dispatchProtocol(line) {
        // 健壮性检查：支持 DATA, REF, TRIG, FERT
        if (line.startsWith("DATA:")) {
            const nums = line.match(/-?\d+/g); // 支持负数
            if (nums && nums.length >= TOTAL) updateUI(nums);
        } 
        else if (line.startsWith("REF:")) {
            const nums = line.match(/-?\d+/g);
            if (nums && nums.length >= TOTAL) {
                for (let i = 0; i < TOTAL; i++) tc_ref[i] = parseInt(nums[i]);
                debugEl.innerText = "基准已更新";
            }
        } 
        else if (line.startsWith("TRIG:")) {
            const p = line.match(/\d+/g);
            if (p && p.length >= 3) {
                const record = `String ${p[0]} | Fret ${p[1]} <span class="note-tag">${midiToNote(p[2])}</span> (MIDI: ${p[2]})`;
                triggerHistory.push(record);
                if (triggerHistory.length > 6) triggerHistory.shift();
                updateTriggerUI();
            }
        } 
        else if (line.startsWith("FERT:")) {
            const p = line.match(/-?\d+/g);
            if (p && p.length >= 2) {
                capoA = parseInt(p[0]);
                offsetB = parseInt(p[1]);
                updateFretDisplay();
            }
        }
    }

    function updateTriggerUI() {
        trigListEl.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const div = document.createElement('div');
            div.className = 'trig-row';
            const idx = triggerHistory.length - 6 + i;
            if (idx >= 0) {
                div.innerHTML = triggerHistory[idx];
                if (i === 5) div.classList.add('latest');
            } else { div.innerHTML = "-"; }
            trigListEl.appendChild(div);
        }
    }

    function updateUI(nums) {
        const tThresh = parseInt(document.getElementById('input-touch').value);
        const dMax = parseInt(document.getElementById('input-dmax').value);
        for (let i = 0; i < TOTAL; i++) {
            const val = parseInt(nums[i]);
            current_tc[i] = val;
            const delta = val - tc_ref[i];
            const cell = cells[i];
            if(!cell) continue;

            const ratio = isDeltaMode ? Math.max(0, Math.min(1, delta / dMax)) : 0;
            cell.v.innerText = isDeltaMode ? delta : val;
            cell.sub.innerText = `R:${val}`;
            cell.el.style.backgroundColor = `hsl(${240 - ratio * 240}, 70%, ${25 + ratio * 25}%)`;
            
            if (delta > tThresh) cell.el.classList.add('touched');
            else cell.el.classList.remove('touched');
        }
    }

    document.getElementById('btn-mode').onclick = (e) => {
        isDeltaMode = !isDeltaMode;
        e.target.innerText = isDeltaMode ? "模式: ΔTc" : "模式: Tc";
    };
    document.getElementById('btn-ref-manual').onclick = () => {
        tc_ref = [...current_tc];
        debugEl.innerText = "手动校准完成";
    };
    document.querySelectorAll('input[type="range"]').forEach(s => {
        s.oninput = () => document.getElementById(s.id.replace('input', 'label')).innerText = s.value;
    });
</script>
</body>
</html>
